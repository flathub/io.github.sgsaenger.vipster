id: io.github.sgsaenger.vipster
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
command: vipster
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --filesystem=home
modules:
  - name: nlohmann_json
    buildsystem: cmake-ninja
    config-opts:
      - -DJSON_BuildTests=OFF
    sources:
      - type: git
        url: https://github.com/nlohmann/json.git
        tag: v3.12.0
        commit: 55f93686c01528224f448c19128836e7df245f72
  - name: pybind11
    buildsystem: cmake-ninja
    config-opts:
      - -DPYBIND11_TEST=OFF
    sources:
      - type: git
        url: https://github.com/pybind/pybind11
        tag: v2.13.6
        commit: a2e59f0e7065404b44dfe92a28aca47ba1378dc4
  - name: cli11
    buildsystem: cmake-ninja
    config-opts:
      - -DCLI11_BUILD_TESTS=OFF
      - -DCLI11_BUILD_EXAMPLES=OFF
    sources:
      - type: git
        url: https://github.com/CLIUtils/CLI11
        tag: v2.6.2
        commit: 37bb6edc5317e99af72ef48405e65d9ca5218861
  - name: vipster
    buildsystem: cmake-ninja
    config-opts:
      - -DBUILD_TESTING=OFF
      - -DVIPSTER_DOWNLOAD_DEPENDENCIES=OFF
      - -Dtinyexpr_SOURCE_DIR=/run/build/vipster/tinyexpr
    sources:
      - type: git
        url: https://github.com/sgsaenger/vipster.git
        commit: 383c559fa35c083901a9b0434fc2be68894fc536
      - type: git
        url: https://github.com/codeplea/tinyexpr.git
        commit: 4a7456e2eab88b4c76053c1c4157639ccb930e2b
        dest: tinyexpr
